{% extends 'base.html' %}
{% block title %}Registrar Retiro — SIGA-Tec{% endblock %}
{% block header %}Registrar Retiro de Llave{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm p-6">

        <!-- Encargado en sesion -->
        <div class="bg-green-50 border border-green-200 rounded-lg px-4 py-3 mb-6 flex items-center gap-3">
            <i class="fas fa-user-check text-green-600"></i>
            <div>
                <div class="text-xs text-green-600">Encargado en sesion</div>
                <div class="font-semibold text-green-800">{{ current_user.nombre_completo }}</div>
            </div>
        </div>

        <form method="POST">
            <!-- Buscar docente -->
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    <i class="fas fa-search mr-1"></i>Buscar Docente
                </label>
                <input type="text" id="buscar-docente"
                       placeholder="Escribi apellido o DNI..."
                       autocomplete="off"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-2">
                <div id="resultados-docente" class="border border-gray-200 rounded-lg overflow-hidden hidden"></div>
                <input type="hidden" name="docente_id" id="docente_id" required>
                <div id="docente-seleccionado" class="hidden bg-blue-50 border border-blue-200 rounded-lg px-4 py-3 mt-2">
                    <div class="text-xs text-blue-500">Docente seleccionado</div>
                    <div id="docente-nombre" class="font-semibold text-blue-800"></div>
                    <div id="docente-info" class="text-xs text-gray-500"></div>
                </div>
            </div>

            <!-- Seleccionar carro -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    <i class="fas fa-box mr-1"></i>Seleccionar Carro
                </label>
                <select name="carro_id" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">-- Selecciona un carro --</option>
                    {% for carro in carros %}
                    <option value="{{ carro.id }}">
                        {{ carro.display }} — {{ carro.aula or 'Sin aula' }} | {{ carro.division or 'Sin division' }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex gap-3">
                <button type="submit"
                        class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-semibold">
                    <i class="fas fa-check mr-2"></i>Confirmar Retiro
                </button>
                <a href="{{ url_for('prestamos.carros') }}"
                   class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-semibold">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const input    = document.getElementById('buscar-docente');
    const results  = document.getElementById('resultados-docente');
    const hiddenId = document.getElementById('docente_id');
    const selBox   = document.getElementById('docente-seleccionado');
    const selNombre = document.getElementById('docente-nombre');
    const selInfo   = document.getElementById('docente-info');

    let timer;
    input.addEventListener('input', () => {
        clearTimeout(timer);
        const q = input.value.trim();
        if (q.length < 2) { results.classList.add('hidden'); return; }
        timer = setTimeout(async () => {
            const res  = await fetch(`/docentes/buscar?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            results.innerHTML = '';
            if (data.length === 0) {
                results.innerHTML = '<div class="px-4 py-3 text-gray-400 text-sm">Sin resultados</div>';
            } else {
                data.forEach(d => {
                    const div = document.createElement('div');
                    div.className = 'px-4 py-3 hover:bg-blue-50 cursor-pointer text-sm border-b last:border-0';
                    div.innerHTML = `<strong>${d.nombre}</strong> <span class="text-gray-400 ml-2">DNI: ${d.dni}</span><div class="text-xs text-gray-400">${d.materia} | ${d.turno}</div>`;
                    div.addEventListener('click', () => {
                        hiddenId.value   = d.id;
                        selNombre.textContent = d.nombre;
                        selInfo.textContent   = `DNI: ${d.dni} | ${d.materia} | Turno: ${d.turno}`;
                        selBox.classList.remove('hidden');
                        results.classList.add('hidden');
                        input.value = d.nombre;
                    });
                    results.appendChild(div);
                });
            }
            results.classList.remove('hidden');
        }, 300);
    });
</script>
{% endblock %}
