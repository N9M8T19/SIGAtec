{% extends 'base.html' %}
{% block title %}Etiquetas — SIGA-Tec{% endblock %}
{% block header %}Etiquetas de Netbooks{% endblock %}

{% block content %}

<style>
.et-toolbar {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
}
.et-toolbar select, .et-toolbar input[type=text] {
    border: 1px solid #d1d5db;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    color: #374151;
    background: white;
    height: 36px;
    outline: none;
}
.et-toolbar select:focus, .et-toolbar input[type=text]:focus {
    border-color: #1a2a6c;
    box-shadow: 0 0 0 2px rgba(26,42,108,.1);
}
.et-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    background: white;
    color: #374151;
    font-size: 13px;
    cursor: pointer;
    height: 36px;
    white-space: nowrap;
    transition: all .15s;
}
.et-btn:hover { border-color: #1a2a6c; color: #1a2a6c; }
.et-btn-orange { background: #e8821a; color: white; border-color: #e8821a; }
.et-btn-orange:hover { background: #c96c0f; }
.et-btn:disabled { opacity: .5; cursor: not-allowed; }
.et-status { font-size: 13px; color: #6b7280; padding: 6px 0 12px; }
.et-status strong { color: #1a2a6c; }
.et-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
}
.et-card {
    background: white;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 11px 13px;
    cursor: pointer;
    transition: border-color .15s;
    user-select: none;
}
.et-card:hover { border-color: #1a2a6c; }
.et-card.selected { border: 2px solid #1a2a6c; background: #eef2fa; }
.et-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
.et-badge-carro { font-size: 11px; color: #e8821a; font-weight: 600; }
.et-check { width: 16px; height: 16px; border: 1.5px solid #9ca3af; border-radius: 4px; background: white; flex-shrink: 0; }
.et-card.selected .et-check { background: #1a2a6c; border-color: #1a2a6c; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-size: 10px; background-repeat: no-repeat; background-position: center; }
.et-serie { font-size: 12px; font-weight: 600; color: #111827; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.et-alumno { font-size: 11px; color: #6b7280; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.et-tm { color: #185FA5; font-weight: 600; font-size: 10px; }
.et-tt { color: #854F0B; font-weight: 600; font-size: 10px; }
.et-empty, .et-loading { grid-column: 1 / -1; text-align: center; padding: 48px 20px; color: #9ca3af; font-size: 14px; }

/* ── IMPRESIÓN ── */
@media screen { #print-area { display: none; } }
@media print {
    .no-print { display: none !important; }
    #print-area { display: block !important; }
    body { background: white !important; margin: 0; padding: 0; }
    .et-print-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5mm;
        padding: 8mm;
    }
    .et-print-wrap { break-inside: avoid; page-break-inside: avoid; }
}

/* ── DISEÑO ETIQUETA ── */
.etiqueta {
    font-family: Arial, sans-serif;
    border: 1.5px solid #1a2a6c;
    border-radius: 6px;
    overflow: hidden;
    width: 100%;
}
.etiqueta-hdr {
    background: #1a2a6c;
    color: white;
    padding: 4px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.etiqueta-hdr-accent { width: 3px; height: 18px; background: #e8821a; border-radius: 2px; flex-shrink: 0; }
.etiqueta-hdr-titulo { font-size: 10px; font-weight: 700; letter-spacing: .5px; }
.etiqueta-body { padding: 5px 8px 4px; background: white; }
.etiqueta-row { display: flex; align-items: baseline; gap: 4px; margin-bottom: 2px; }
.etiqueta-lbl { font-size: 7px; color: #9ca3af; text-transform: uppercase; letter-spacing: .3px; min-width: 44px; flex-shrink: 0; }
.etiqueta-val { font-size: 10px; font-weight: 700; color: #1a2a6c; flex: 1; }
.etiqueta-hr { border: none; border-top: .5px solid #e5e7eb; margin: 4px 0; }
.etiqueta-barcode { text-align: center; padding: 3px 8px 2px; background: white; }
.etiqueta-barcode svg { max-width: 100%; height: auto; }
.etiqueta-turnos { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-top: 3px; }
.etiqueta-turno { padding: 3px 5px; border-radius: 3px; }
.etiqueta-turno.m { background: #E6F1FB; }
.etiqueta-turno.t { background: #FAEEDA; }
.etiqueta-turno-lbl { font-size: 7px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
.etiqueta-turno.m .etiqueta-turno-lbl { color: #0C447C; }
.etiqueta-turno.t .etiqueta-turno-lbl { color: #854F0B; }
.etiqueta-turno-nombre { font-size: 8px; font-weight: 600; color: #111827; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.etiqueta-turno-curso { font-size: 7px; margin-top: 1px; }
.etiqueta-turno.m .etiqueta-turno-curso { color: #185FA5; }
.etiqueta-turno.t .etiqueta-turno-curso { color: #854F0B; }
</style>

{# ── BARRA DE HERRAMIENTAS ── #}
<div class="et-toolbar no-print">
    <select id="sel-carro">
        <option value="">Todos los carros</option>
        {% for c in carros %}
        <option value="{{ c.id }}">Carro {{ c.numero_fisico }}{% if c.division %} — {{ c.division }}{% endif %}</option>
        {% endfor %}
    </select>
    <input type="text" id="buscar" placeholder="Buscar serie o alumno..." style="width:200px">
    <button class="et-btn" onclick="selTodo()">Seleccionar todo</button>
    <button class="et-btn" onclick="selNada()">Deseleccionar</button>
    <div style="flex:1"></div>
    <button class="et-btn et-btn-orange" id="btn-imprimir" onclick="imprimir()" disabled>
        <i class="fas fa-print mr-1"></i> Imprimir seleccionadas
    </button>
</div>

<p class="et-status no-print" id="status-bar">Cargando netbooks...</p>

<div class="et-grid no-print" id="et-grid">
    <div class="et-loading"><i class="fas fa-circle-notch fa-spin mr-2"></i>Cargando...</div>
</div>

{# ── ÁREA DE IMPRESIÓN ── #}
<div id="print-area">
    <div class="et-print-grid" id="print-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script>
let todasLasNetbooks = [];
let seleccionadas = new Set();

function normalizar(str) {
    return (str || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function filtradas() {
    const carroId = parseInt(document.getElementById('sel-carro').value) || null;
    const q = normalizar(document.getElementById('buscar').value);
    return todasLasNetbooks.filter(n => {
        if (carroId && n.carro_id !== carroId) return false;
        if (q) {
            const hay = normalizar([n.numero_serie, n.numero_interno, n.alumno_manana, n.alumno_tarde, n.carro].join(' '));
            if (!hay.includes(q)) return false;
        }
        return true;
    });
}

function renderGrid() {
    const grid = document.getElementById('et-grid');
    const items = filtradas();
    document.getElementById('status-bar').innerHTML =
        `<strong>${seleccionadas.size}</strong> seleccionadas · mostrando <strong>${items.length}</strong> de <strong>${todasLasNetbooks.length}</strong> netbooks`;
    document.getElementById('btn-imprimir').disabled = seleccionadas.size === 0;

    if (items.length === 0) {
        grid.innerHTML = '<div class="et-empty"><i class="fas fa-search mr-2"></i>No se encontraron netbooks.</div>';
        return;
    }
    grid.innerHTML = items.map(n => {
        const sel = seleccionadas.has(n.id);
        return `<div class="et-card ${sel ? 'selected' : ''}" onclick="toggleCard(${n.id})">
            <div class="et-card-top">
                <span class="et-badge-carro">N°${n.numero_interno} · ${n.carro}</span>
                <div class="et-check"></div>
            </div>
            <div class="et-serie">${n.numero_serie || '(sin serie)'}</div>
            <div class="et-alumno"><span class="et-tm">TM</span> ${n.alumno_manana || '—'}</div>
            <div class="et-alumno"><span class="et-tt">TT</span> ${n.alumno_tarde || '—'}</div>
        </div>`;
    }).join('');
}

function toggleCard(id) {
    if (seleccionadas.has(id)) seleccionadas.delete(id);
    else seleccionadas.add(id);
    renderGrid();
}

function selTodo() { filtradas().forEach(n => seleccionadas.add(n.id)); renderGrid(); }
function selNada() { filtradas().forEach(n => seleccionadas.delete(n.id)); renderGrid(); }

function mkEtiqueta(n) {
    return `<div class="et-print-wrap" data-serie="${n.numero_serie || ''}">
    <div class="etiqueta">
        <div class="etiqueta-hdr">
            <div class="etiqueta-hdr-accent"></div>
            <div class="etiqueta-hdr-titulo">SIGA-Tec &nbsp;·&nbsp; E.T. N°7 D.E. 5</div>
        </div>
        <div class="etiqueta-body">
            <div class="etiqueta-row">
                <span class="etiqueta-lbl">N° serie</span>
                <span class="etiqueta-val">${n.numero_serie || '—'}</span>
            </div>
            <div class="etiqueta-row">
                <span class="etiqueta-lbl">Interno</span>
                <span class="etiqueta-val">${n.numero_interno || '—'}</span>
                <span class="etiqueta-lbl" style="margin-left:6px">Carro</span>
                <span class="etiqueta-val">${n.carro || '—'}</span>
            </div>
            ${n.aula ? `<div class="etiqueta-row"><span class="etiqueta-lbl">Aula</span><span class="etiqueta-val">${n.aula}</span></div>` : ''}
        </div>
        <div class="etiqueta-barcode"><svg></svg></div>
        <hr class="etiqueta-hr" style="margin:0 8px;">
        <div class="etiqueta-body" style="padding-top:3px">
            <div class="etiqueta-turnos">
                <div class="etiqueta-turno m">
                    <div class="etiqueta-turno-lbl">Turno Mañana</div>
                    <div class="etiqueta-turno-nombre">${n.alumno_manana || 'Sin asignar'}</div>
                    ${n.curso_manana ? `<div class="etiqueta-turno-curso">${n.curso_manana}</div>` : ''}
                </div>
                <div class="etiqueta-turno t">
                    <div class="etiqueta-turno-lbl">Turno Tarde</div>
                    <div class="etiqueta-turno-nombre">${n.alumno_tarde || 'Sin asignar'}</div>
                    ${n.curso_tarde ? `<div class="etiqueta-turno-curso">${n.curso_tarde}</div>` : ''}
                </div>
            </div>
        </div>
    </div></div>`;
}

function generarBarcodes() {
    todasLasNetbooks.filter(n => seleccionadas.has(n.id)).forEach(n => {
        const el = document.getElementById('bc-' + n.id);
        if (el && n.numero_serie) {
            try {
                JsBarcode(el, n.numero_serie, {
                    format: 'CODE128',
                    width: 1.2,
                    height: 28,
                    displayValue: false,
                    margin: 0
                });
            } catch(e) { el.style.display = 'none'; }
        }
    });
}

function imprimir() {
    const sel = todasLasNetbooks.filter(n => seleccionadas.has(n.id));
    if (sel.length === 0) return;

    const html = sel.map(mkEtiqueta).join('');

    const ventana = window.open('', '_blank', 'width=900,height=700');
    ventana.document.write(`<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Etiquetas SIGA-Tec</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:white;font-family:Arial,sans-serif}
.et-print-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5mm;padding:8mm}
.et-print-wrap{break-inside:avoid;page-break-inside:avoid}
.etiqueta{font-family:Arial,sans-serif;border:1.5px solid #1a2a6c;border-radius:6px;overflow:hidden;width:100%}
.etiqueta-hdr{background:#1a2a6c;color:white;padding:4px 8px;display:flex;align-items:center;gap:6px}
.etiqueta-hdr-accent{width:3px;height:18px;background:#e8821a;border-radius:2px;flex-shrink:0}
.etiqueta-hdr-titulo{font-size:10px;font-weight:700;letter-spacing:.5px;color:white}
.etiqueta-body{padding:5px 8px 4px;background:white}
.etiqueta-row{display:flex;align-items:baseline;gap:4px;margin-bottom:2px}
.etiqueta-lbl{font-size:7px;color:#9ca3af;text-transform:uppercase;letter-spacing:.3px;min-width:44px;flex-shrink:0}
.etiqueta-val{font-size:10px;font-weight:700;color:#1a2a6c;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.etiqueta-hr{border:none;border-top:.5px solid #e5e7eb;margin:0 8px}
.etiqueta-barcode{text-align:center;padding:3px 8px 2px;background:white}
.etiqueta-barcode svg{max-width:100%;height:auto}
.etiqueta-turnos{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:4px 8px 5px}
.etiqueta-turno{padding:3px 5px;border-radius:3px}
.etiqueta-turno.m{background:#E6F1FB}
.etiqueta-turno.t{background:#FAEEDA}
.etiqueta-turno-lbl{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.etiqueta-turno.m .etiqueta-turno-lbl{color:#0C447C}
.etiqueta-turno.t .etiqueta-turno-lbl{color:#854F0B}
.etiqueta-turno-nombre{font-size:8px;font-weight:600;color:#111827;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.etiqueta-turno-curso{font-size:7px;margin-top:1px}
.etiqueta-turno.m .etiqueta-turno-curso{color:#185FA5}
.etiqueta-turno.t .etiqueta-turno-curso{color:#854F0B}
@media print{body{margin:0;padding:0}.et-print-grid{padding:5mm;gap:4mm}}
</style>
</head><body>
<div class="et-print-grid">${html}</div>
<script>
window.onload = function() {
    document.querySelectorAll('[data-serie]').forEach(function(el) {
        var svg = el.querySelector('svg');
        var serie = el.getAttribute('data-serie');
        if (svg && serie) {
            try { JsBarcode(svg, serie, {format:'CODE128',width:1.1,height:26,displayValue:false,margin:0}); } catch(e){}
        }
    });
    setTimeout(function(){ window.print(); }, 400);
};
<\/script>
</body></html>`);
    ventana.document.close();
}

async function cargarDatos() {
    try {
        const carroId = document.getElementById('sel-carro').value;
        const url = `/etiquetas/api/datos${carroId ? '?carro_id=' + carroId : ''}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error();
        todasLasNetbooks = await resp.json();
        renderGrid();
    } catch(e) {
        document.getElementById('et-grid').innerHTML = '<div class="et-empty"><i class="fas fa-exclamation-triangle mr-2"></i>Error al cargar los datos.</div>';
    }
}

document.getElementById('sel-carro').addEventListener('change', () => { seleccionadas.clear(); cargarDatos(); });
document.getElementById('buscar').addEventListener('input', renderGrid);

cargarDatos();
</script>

{% endblock %}
