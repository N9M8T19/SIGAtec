{% extends 'base.html' %}
{% block title %}{{ 'Nuevo' if not carro else 'Editar' }} Carro — SIGA-Tec{% endblock %}
{% block header %}{{ 'Nuevo Carro' if not carro else 'Editar Carro ' + carro.display }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm p-6">
        <form method="POST">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Numero de Carro (fisico)</label>
                    <input type="text" name="numero_fisico"
                           value="{{ carro.numero_fisico if carro else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Numero de Serie</label>
                    <input type="text" name="numero_serie"
                           value="{{ carro.numero_serie if carro else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Division</label>
                    <input type="text" name="division"
                           value="{{ carro.division if carro else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Aula</label>
                    <input type="text" name="aula"
                           value="{{ carro.aula if carro else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">URL Google Sheet</label>
                <input type="text" name="sheet_url"
                       value="{{ carro.sheet_url if carro else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                       placeholder="https://docs.google.com/spreadsheets/...">
            </div>
            <div class="flex gap-3">
                <button type="submit"
                        class="bg-blue-900 hover:bg-blue-800 text-white px-6 py-2 rounded-lg font-semibold">
                    Guardar
                </button>
                <a href="{{ url_for('carros.index') }}"
                   class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-semibold">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
