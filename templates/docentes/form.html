{% extends 'base.html' %}
{% block title %}{{ 'Nuevo' if not docente else 'Editar' }} Docente — SIGA-Tec{% endblock %}
{% block header %}{{ 'Nuevo Docente' if not docente else 'Editar: ' + docente.nombre_completo }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm p-6">
        <form method="POST">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">DNI *</label>
                    <input type="text" name="dni" required
                           value="{{ docente.dni if docente else '' }}"
                           {% if docente %}readonly class="w-full px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500"
                           {% else %}class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"{% endif %}>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Turno</label>
                    <select name="turno"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        {% for t in turnos %}
                        <option value="{{ t }}" {% if docente and docente.turno == t %}selected{% endif %}>{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
                    <input type="text" name="nombre" required
                           value="{{ docente.nombre if docente else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Apellido *</label>
                    <input type="text" name="apellido" required
                           value="{{ docente.apellido if docente else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Materia</label>
                    <input type="text" name="materia"
                           value="{{ docente.materia if docente else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo</label>
                    <input type="email" name="correo"
                           value="{{ docente.correo if docente else '' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div class="flex gap-3">
                <button type="submit"
                        class="bg-blue-900 hover:bg-blue-800 text-white px-6 py-2 rounded-lg font-semibold">
                    Guardar
                </button>
                <a href="{{ url_for('docentes.index') }}"
                   class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-semibold">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
