{% extends 'base.html' %}
{% block title %}Agregar Módulo — {{ docente.nombre_completo }} — SIGA-Tec{% endblock %}
{% block header %}Agregar Módulo — {{ docente.nombre_completo }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm p-6">
        <form method="POST">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Día *</label>
                    <select name="dia" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">-- Seleccionar día --</option>
                        {% for dia in dias %}
                        <option value="{{ dia }}">{{ dia }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Módulo *</label>
                    <select name="modulo" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">-- Seleccionar módulo --</option>
                        {% for num, (inicio, fin) in modulos.items() %}
                        <option value="{{ num }}">Módulo {{ num }} ({{ inicio }} - {{ fin }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Materia</label>
                    <input type="text" name="materia"
                           value="{{ docente.materia or '' }}"
                           placeholder="{{ docente.materia or 'Materia...' }}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <p class="text-xs text-gray-400 mt-1">Por defecto usa la materia del docente</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Aula</label>
                    <input type="text" name="aula"
                           placeholder="Ej: 301"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div class="flex gap-3">
                <button type="submit"
                        class="bg-blue-900 hover:bg-blue-800 text-white px-6 py-2 rounded-lg font-semibold">
                    <i class="fas fa-plus mr-2"></i>Agregar
                </button>
                <a href="{{ url_for('horarios.ver_docente', docente_id=docente.id) }}"
                   class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-semibold">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
