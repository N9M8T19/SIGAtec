{% extends 'base.html' %}
{% block title %}Reportes — SIGA-Tec{% endblock %}
{% block header %}Reportes{% endblock %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <a href="{{ url_for('reportes.estadisticas') }}"
       class="bg-white rounded-xl shadow-sm p-6 hover:shadow-md transition-shadow flex items-center gap-4">
        <div class="bg-blue-100 rounded-full p-4">
            <i class="fas fa-chart-pie text-2xl text-blue-700"></i>
        </div>
        <div>
            <div class="font-bold text-gray-800">Estadisticas por Docente y Materia</div>
            <div class="text-sm text-gray-500">Ranking de uso, tiempo promedio y mas</div>
        </div>
    </a>
    <a href="{{ url_for('prestamos.historial') }}"
       class="bg-white rounded-xl shadow-sm p-6 hover:shadow-md transition-shadow flex items-center gap-4">
        <div class="bg-green-100 rounded-full p-4">
            <i class="fas fa-history text-2xl text-green-700"></i>
        </div>
        <div>
            <div class="font-bold text-gray-800">Historial de Prestamos</div>
            <div class="text-sm text-gray-500">Ver todos los prestamos por periodo</div>
        </div>
    </a>
</div>
{% endblock %}
