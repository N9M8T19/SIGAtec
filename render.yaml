services:
  - type: web
    name: sigartec
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sigartec-db
          property: connectionString

databases:
  - name: sigartec-db
    plan: free
